<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./popup.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </head>

  <body style="background-color: rgb(36, 48, 111);">
    <template id="li_template">
      <li>
        <a>
          <h3 class="title">Tab Title</h3>
          <p class="pathname">Tab Pathname</p>
        </a>
      </li>
    </template>

    <div class="position-relative py-2 px-4 border border-secondary text-center" style="margin: 0.5em; border-radius: 0.5em; background-color: #132dab; color: white;" >
      Tabs Manager
    </div>

    <div class="btn-group" role="group" aria-label="Basic outlined example" style="padding: 1em; ">
      <button id="sort-alphabetically"class="btn btn-primary btn-sm sort-btn" style="margin: 0.1em; background-color: #132dab;">Sort Alphabetically</button>
      <button id="sort-by-most-recent" class="btn btn-primary btn-sm sort-btn" style="margin: 0.1em; background-color: #132dab;">Sort Most Recent</button>
      <button id="sort-by-least-recent" class="btn btn-primary btn-sm sort-btn" style="margin: 0.1em; background-color: #132dab;">Sort Least Recent</button>
    </div>

    <div class="btn-group" role="group" aria-label="Basic outlined example" style="padding: 1em;">
      <button id="group-alphabetically" class="btn btn-primary btn-sm" style="margin: 0.1em; background-color: #132dab;">Group Alphabetically</button>
      <button id="group-by-site" class="btn btn-primary btn-sm" style="margin: 0.1em; background-color: #132dab;">Group By Site</button>
      <button id="ungroup" class="btn btn-primary btn-sm" style="margin: 0.1em; background-color: #132dab;">Ungroup</button>
    </div>

    <div class="btn-group d-flex" role="group" aria-label="Basic outlined example" style="padding: 1em;"> 
      <button id="expand-groups" class="btn btn-primary btn-sm" style="margin: 0.1em; background-color: #132dab;">Expand Groups</button>
      <button id="collapse-groups" class="btn btn-primary btn-sm" style="margin: 0.1em; background-color: #132dab;">Collapse Groups</button>
    </div>



    <script src="./sort-alphabetically.js" type="module"></script>
    <script src="./sort-recent.js" type="module"></script>
    <script src="./group-alphabetically.js" type="module"></script>
    <script src="./ungroup.js" type="module"></script>
    <script src="./group-by-site.js" type="module"></script>
    <script src="./expand-collapse-groups.js" type="module"></script>


    <div class="btn-group position-relative start-50 translate-middle" role="group" aria-label="Basic checkbox toggle button group" style="margin-top: 2em;">
      <input type="checkbox" class="form-check-input" id="btncheck1" autocomplete="off" style="accent-color: #204af4;">
      <label class="for-check-label small" for="btncheck1" style="color: white; margin-left: 1em;"> Apply To All Windows</label>
    </div>


  </body>
</html>
